version: '3.8'

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
      - NVIDIA_BASE_URL=${NVIDIA_BASE_URL}
      - NVIDIA_MODEL=${NVIDIA_MODEL}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./stock_research.db}
    volumes:
      - ./stock_research.db:/app/stock_research.db
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev

networks:
  default:
    name: stock-research-network
